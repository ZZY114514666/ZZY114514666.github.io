<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>粒子星河 · 个人工作室</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden; /* 防止滚动，粒子全屏 */
      background: #0b0b14;
    }

    /* ===== 粒子画布 ===== */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      display: block;
    }

    /* ===== 内容层（浮在粒子上方） ===== */
    .overlay {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      overflow-y: auto; /* 内容可滚动 */
      -webkit-overflow-scrolling: touch;
      padding: 30px 16px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 半透明遮罩让文字清晰 */
      background: rgba(10, 10, 20, 0.35);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== 卡片（玻璃质感 + 悬停） ===== */
    .card {
      background: rgba(18, 20, 35, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 26px 22px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s ease;
    }

    .card:active {
      transform: scale(0.97);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    @media (hover: hover) {
      .card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        border-color: rgba(255, 255, 255, 0.12);
      }
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #f8f9fa, #b0d4ff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: rgba(220, 230, 245, 0.8);
      font-size: 15px;
      line-height: 1.7;
      font-weight: 300;
    }

    .highlight {
      color: #a78bfa;
      font-weight: 500;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px 0;
      background: linear-gradient(145deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 60px;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      text-decoration: none;
      margin: 16px 0 6px;
      transition: opacity 0.15s ease;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.35);
    }

    .btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 10px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 13px;
      color: #cfdfff;
      font-weight: 300;
    }

    .preview-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 14px;
    }

    .preview-img {
      width: 100%;
      border-radius: 14px;
      display: block;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .footer-note {
      text-align: center;
      color: rgba(255, 255, 255, 0.15);
      font-size: 11px;
      margin-top: 16px;
    }

    @media (max-width: 480px) {
      .overlay { padding: 20px 12px 30px; }
      .card { padding: 20px 16px; }
      .title { font-size: 22px; }
      .btn { font-size: 15px; padding: 13px 0; }
    }
  </style>
</head>
<body>

  <!-- ===== 粒子画布 ===== -->
  <canvas id="particleCanvas"></canvas>

  <!-- ===== 内容层 ===== -->
  <div class="overlay">
    <div class="container">
      <div class="card">
        <div class="title">✨ 星尘工作室</div>
        <div class="subtitle">
          专注 · 创新 · 极客精神<br>
          <span class="highlight">用心打磨每一行代码</span>
        </div>
        <a href="#" class="btn">📩 联系主理人</a>
        <div class="tags">
          <span class="tag">🛠 全栈开发</span>
          <span class="tag">🎨 UI/UX 设计</span>
          <span class="tag">📱 移动端优先</span>
        </div>
      </div>

      <div class="card">
        <div class="title">⚡ 我们的优势</div>
        <div class="subtitle" style="margin-bottom: 4px;">
          快速响应 ｜ 专业交付 ｜ 透明沟通
        </div>
        <div class="tags">
          <span class="tag">✅ 需求分析</span>
          <span class="tag">🚀 敏捷开发</span>
          <span class="tag">🔒 隐私合规</span>
        </div>
      </div>

      <div class="card">
        <div class="title">🛡️ 安全 & 诚信</div>
        <div class="subtitle">
          严格保密客户信息 · 不夸大 · 不盲从<br>
          <span style="color: #a78bfa; font-weight: 400;">每一份交付都可追溯</span>
        </div>
      </div>

      <div class="card">
        <div class="title">📸 近期作品</div>
        <div class="subtitle" style="margin-bottom: 8px; font-size: 13px;">（示例截图 · 可替换为你自己的图片）</div>
        <div class="preview-grid">
          <img class="preview-img" src="https://picsum.photos/600/300?random=1" alt="作品截图1" />
          <img class="preview-img" src="https://picsum.photos/600/300?random=2" alt="作品截图2" />
        </div>
      </div>

      <div class="footer-note">© 2026 · 用 ❤️ 和 键盘 打造</div>
    </div>
  </div>

  <!-- ===== 背景音乐 ===== -->
  <audio id="bgm" src="https://cdn.statically.io/gh/ZZY114514666/ZZY114514666.github.io/main/Sea_breeze(Phonk)-DJ%E5%B0%8F%E8%92%8B-450529779-100(1).mp3" preload="none"></audio>

  <script>
    // ============================================================
    // 1. 粒子系统（彩虹色 + 陀螺仪互动）
    // ============================================================
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let particles = [];
    const PARTICLE_COUNT = 120;

    // 陀螺仪数据（手机晃动）
    let gyroX = 0, gyroY = 0;
    let targetGX = 0, targetGY = 0;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 生成彩虹色（HSL 轮盘）
    function rainbowHue(index, total) {
      return (index / total) * 360 + Date.now() * 0.008;
    }

    class Particle {
      constructor(index) {
        this.index = index;
        this.reset();
        // 每个粒子初始位置随机
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        // 给每个粒子一个随机偏移速度（游走感）
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
      }

      reset() {
        this.size = 3 + Math.random() * 5;      // 大小 3~8px
        this.baseX = Math.random() * width;
        this.baseY = Math.random() * height;
        // 游走幅度
        this.wanderRadius = 60 + Math.random() * 100;
        this.wanderSpeed = 0.005 + Math.random() * 0.01;
        this.angle = Math.random() * Math.PI * 2;
        // 透明度
        this.alpha = 0.4 + Math.random() * 0.6;
      }

      update() {
        // 1. 陀螺仪影响：粒子向倾斜方向偏移
        const influence = 1.2;
        const driftX = gyroX * influence;
        const driftY = gyroY * influence;

        // 2. 游走运动（让粒子像萤火虫一样飘）
        this.angle += this.wanderSpeed;
        const wanderX = Math.sin(this.angle) * this.wanderRadius * 0.02;
        const wanderY = Math.cos(this.angle * 0.7) * this.wanderRadius * 0.02;

        // 目标位置 = 基座 + 游走偏移 + 陀螺仪偏移
        const targetX = this.baseX + wanderX + driftX * 30;
        const targetY = this.baseY + wanderY + driftY * 30;

        // 平滑移动（lerp）
        this.x += (targetX - this.x) * 0.025;
        this.y += (targetY - this.y) * 0.025;

        // 边界回弹（防止跑太远）
        if (this.x < -50) this.x = width + 50;
        if (this.x > width + 50) this.x = -50;
        if (this.y < -50) this.y = height + 50;
        if (this.y > height + 50) this.y = -50;
      }

      draw() {
        const hue = (this.index / PARTICLE_COUNT) * 360 + Date.now() * 0.02;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, 85%, 65%, ${this.alpha * 0.85})`;
        ctx.fill();

        // 发光小光晕
        const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
        glow.addColorStop(0, `hsla(${hue}, 90%, 70%, 0.2)`);
        glow.addColorStop(1, `hsla(${hue}, 90%, 70%, 0)`);
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 初始化粒子
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle(i));
    }

    // 连接线（距离近的粒子之间画线）
    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 130) {
            const alpha = (1 - dist / 130) * 0.25;
            const hue = (i / particles.length) * 360 + Date.now() * 0.01;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
            ctx.lineWidth = 1.2;
            ctx.stroke();
          }
        }
      }
    }

    // 动画循环
    function animate() {
      ctx.clearRect(0, 0, width, height);

      // 更新粒子
      for (const p of particles) {
        p.update();
      }

      // 画连接线（先画线，再画粒子在上面）
      drawLines();

      // 画粒子
      for (const p of particles) {
        p.draw();
      }

      requestAnimationFrame(animate);
    }

    animate();

    // ============================================================
    // 2. 陀螺仪 API（手机晃动）
    // ============================================================
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', (e) => {
        // beta: 前后倾斜 (-180~180), gamma: 左右倾斜 (-90~90)
        let beta = e.beta || 0;
        let gamma = e.gamma || 0;
        // 归一化到 -1 ~ 1
        targetGX = Math.max(-1, Math.min(1, gamma / 45));
        targetGY = Math.max(-1, Math.min(1, beta / 45));
      });

      // iOS 13+ 需要请求权限
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => {
          if (state === 'granted') {
            window.addEventListener('deviceorientation', (e) => {
              let beta = e.beta || 0;
              let gamma = e.gamma || 0;
              targetGX = Math.max(-1, Math.min(1, gamma / 45));
              targetGY = Math.max(-1, Math.min(1, beta / 45));
            });
          }
        }).catch(() => {});
      }
    }

    // 平滑陀螺仪数据（避免突变）
    setInterval(() => {
      gyroX += (targetGX - gyroX) * 0.12;
      gyroY += (targetGY - gyroY) * 0.12;
    }, 30);

    // 如果没有陀螺仪，让粒子缓慢自动漂移（模拟）
    let autoDrift = 0;
    setInterval(() => {
      if (!window.DeviceOrientationEvent) {
        autoDrift += 0.003;
        targetGX = Math.sin(autoDrift) * 0.3;
        targetGY = Math.cos(autoDrift * 0.7) * 0.2;
      }
    }, 50);

    // ============================================================
    // 3. 背景音乐（点击播放）
    // ============================================================
    const audio = document.getElementById('bgm');
    if (audio) {
      const playBGM = () => {
        audio.play().then(() => {
          document.removeEventListener('click', playBGM);
          document.removeEventListener('touchstart', playBGM);
        }).catch(() => {});
      };
      document.addEventListener('click', playBGM);
      document.addEventListener('touchstart', playBGM);
    }
  </script>
</body>
</html>
