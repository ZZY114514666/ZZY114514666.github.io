<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>粒子星河 · 个人工作室</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      overflow-y: auto; /* ✅ 允许滚动 */
      background: #0b0b14;
      -webkit-overflow-scrolling: touch;
    }

    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      display: block;
      pointer-events: none; /* 让点击穿透到内容 */
    }

    .overlay {
      position: relative;
      z-index: 1;
      min-height: 100vh; /* ✅ 改为 min-height 让内容撑开 */
      padding: 30px 16px 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 20, 0.35);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: rgba(18, 20, 35, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 26px 22px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s ease;
    }

    .card:active {
      transform: scale(0.97);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    @media (hover: hover) {
      .card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        border-color: rgba(255, 255, 255, 0.12);
      }
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #f8f9fa, #b0d4ff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: rgba(220, 230, 245, 0.8);
      font-size: 15px;
      line-height: 1.7;
      font-weight: 300;
    }

    .highlight {
      color: #a78bfa;
      font-weight: 500;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px 0;
      background: linear-gradient(145deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 60px;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      text-decoration: none;
      margin: 16px 0 6px;
      transition: opacity 0.15s ease;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.35);
    }

    .btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 10px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 13px;
      color: #cfdfff;
      font-weight: 300;
    }

    .preview-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 14px;
    }

    .preview-img {
      width: 100%;
      border-radius: 14px;
      display: block;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .footer-note {
      text-align: center;
      color: rgba(255, 255, 255, 0.15);
      font-size: 11px;
      margin-top: 16px;
    }

    @media (max-width: 480px) {
      .overlay { padding: 20px 12px 40px; }
      .card { padding: 20px 16px; }
      .title { font-size: 22px; }
      .btn { font-size: 15px; padding: 13px 0; }
    }
  </style>
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <div class="overlay">
    <div class="container">
      <div class="card">
        <div class="title">✨ 星尘工作室</div>
        <div class="subtitle">
          专注 · 创新 · 极客精神<br>
          <span class="highlight">用心打磨每一行代码</span>
        </div>
        <a href="mqq://im/chat?chat_type=wpa&uin=3561363267&version=1" class="btn">联系我🎭</a>
        <div class="tags">
          <span class="tag">🛠 全栈开发</span>
          <span class="tag">🎨 UI/UX 设计</span>
          <span class="tag">📱 移动端优先</span>
        </div>
      </div>

      <div class="card">
        <div class="title">⚡ 我们的优势</div>
        <div class="subtitle" style="margin-bottom: 4px;">
          快速响应 ｜ 专业交付 ｜ 透明沟通
        </div>
        <div class="tags">
          <span class="tag">✅ 需求分析</span>
          <span class="tag">🚀 敏捷开发</span>
          <span class="tag">🔒 隐私合规</span>
        </div>
      </div>

      <div class="card">
        <div class="title">🛡️ 安全 & 诚信</div>
        <div class="subtitle">
          严格保密客户信息 · 不夸大 · 不盲从<br>
          <span style="color: #a78bfa; font-weight: 400;">每一份交付都可追溯</span>
        </div>
      </div>

      <div class="card">
        <div class="title">📸 近期作品</div>
        <div class="subtitle" style="margin-bottom: 8px; font-size: 13px;">（示例截图 · 可替换为你自己的图片）</div>
        <div class="preview-grid">
          <img class="preview-img" src="https://picsum.photos/600/300?random=1" alt="作品截图1" />
          <img class="preview-img" src="https://picsum.photos/600/300?random=2" alt="作品截图2" />
        </div>
      </div>

      <div class="footer-note">© 2026 · 用 ❤️ 和 键盘 打造</div>
    </div>
  </div>

  <audio id="bgm" src="https://cdn.statically.io/gh/ZZY114514666/ZZY114514666.github.io/main/Sea_breeze(Phonk)-DJ%E5%B0%8F%E8%92%8B-450529779-100(1).mp3" preload="none"></audio>

  <script>
    // ===== 粒子系统 =====
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    const PARTICLE_COUNT = 100; // 减到100个更流畅
    let gyroX = 0, gyroY = 0;
    let targetGX = 0, targetGY = 0;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor(index) {
        this.index = index;
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = 2.5 + Math.random() * 4.5;
        this.baseX = Math.random() * width;
        this.baseY = Math.random() * height;
        this.wanderRadius = 50 + Math.random() * 80;
        this.wanderSpeed = 0.005 + Math.random() * 0.008;
        this.angle = Math.random() * Math.PI * 2;
        this.alpha = 0.4 + Math.random() * 0.6;
      }

      update() {
        const driftX = gyroX * 3.5;
        const driftY = gyroY * 3.5;
        this.angle += this.wanderSpeed;
        const wanderX = Math.sin(this.angle) * this.wanderRadius * 0.015;
        const wanderY = Math.cos(this.angle * 0.7) * this.wanderRadius * 0.015;
        const targetX = this.baseX + wanderX + driftX * 25;
        const targetY = this.baseY + wanderY + driftY * 25;
        this.x += (targetX - this.x) * 0.08;
        this.y += (targetY - this.y) * 0.08;
        if (this.x < -50) this.x = width + 50;
        if (this.x > width + 50) this.x = -50;
        if (this.y < -50) this.y = height + 50;
        if (this.y > height + 50) this.y = -50;
      }

      draw() {
        const hue = (this.index / PARTICLE_COUNT) * 360 + Date.now() * 0.015;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, 85%, 65%, ${this.alpha * 0.8})`;
        ctx.fill();
        const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
        glow.addColorStop(0, `hsla(${hue}, 90%, 70%, 0.15)`);
        glow.addColorStop(1, `hsla(${hue}, 90%, 70%, 0)`);
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle(i));
    }

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            const alpha = (1 - dist / 120) * 0.2;
            const hue = (i / particles.length) * 360 + Date.now() * 0.01;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      for (const p of particles) p.update();
      drawLines();
      for (const p of particles) p.draw();
      requestAnimationFrame(animate);
    }
    animate();

    // ===== 陀螺仪 =====
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', (e) => {
        let beta = e.beta || 0;
        let gamma = e.gamma || 0;
        targetGX = Math.max(-1, Math.min(1, gamma / 45));
        targetGY = Math.max(-1, Math.min(1, beta / 45));
      });
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => {
          if (state === 'granted') {
            window.addEventListener('deviceorientation', (e) => {
              let beta = e.beta || 0;
              let gamma = e.gamma || 0;
              targetGX = Math.max(-1, Math.min(1, gamma / 45));
              targetGY = Math.max(-1, Math.min(1, beta / 45));
            });
          }
        }).catch(() => {});
      }
    }

    setInterval(() => {
      gyroX += (targetGX - gyroX) * 0.12;
      gyroY += (targetGY - gyroY) * 0.12;
    }, 30);

    let autoDrift = 0;
    setInterval(() => {
      if (!window.DeviceOrientationEvent) {
        autoDrift += 0.003;
        targetGX = Math.sin(autoDrift) * 0.3;
        targetGY = Math.cos(autoDrift * 0.7) * 0.2;
      }
    }, 50);

    // ===== BGM =====
    const audioEl = document.getElementById('bgm');
    if (audioEl) {
      const playBGM = () => {
        audioEl.play().then(() => {
          document.removeEventListener('click', playBGM);
          document.removeEventListener('touchstart', playBGM);
        }).catch(() => {});
      };
      document.addEventListener('click', playBGM);
      document.addEventListener('touchstart', playBGM);
    }
  </script>
</body>
</html>
