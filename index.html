<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎂 老爸 · 生日快乐</title>
    <style>
        /* 基础重置 + 毛玻璃卡片（沿用你原来的风格） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
        }
        html,
        body {
            height: 100%;
            overflow-y: auto;
            background: #0b0b14;
            -webkit-overflow-scrolling: touch;
        }
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
            pointer-events: none;
        }
        .overlay {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 30px 16px 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 20, 0.35);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: rgba(18, 20, 35, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 26px 22px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.25s cubic-bezier(.34, 1.56, .64, 1), box-shadow 0.3s ease;
        }
        .card:active {
            transform: scale(0.97);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        @media (hover: hover) {
            .card:hover {
                transform: translateY(-4px) scale(1.01);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
                border-color: rgba(255, 255, 255, 0.12);
            }
        }
        .title {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f8f9fa, #fcd34d, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: rgba(220, 230, 245, 0.8);
            font-size: 15px;
            line-height: 1.7;
            font-weight: 300;
        }
        .highlight {
            color: #fcd34d;
            font-weight: 500;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            background: linear-gradient(145deg, #f59e0b, #d97706);
            border: none;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            text-decoration: none;
            margin: 16px 0 6px;
            transition: opacity 0.15s ease;
            box-shadow: 0 4px 24px rgba(245, 158, 11, 0.35);
        }
        .btn:active {
            opacity: 0.7;
            transform: scale(0.97);
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }
        .tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #cfdfff;
            font-weight: 300;
        }
        .preview-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 14px;
        }
        .preview-img {
            width: 100%;
            border-radius: 14px;
            display: block;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .footer-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            margin-top: 16px;
        }
        @media (max-width: 480px) {
            .overlay {
                padding: 20px 12px 40px;
            }
            .card {
                padding: 20px 16px;
            }
            .title {
                font-size: 22px;
            }
            .btn {
                font-size: 15px;
                padding: 13px 0;
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="overlay">
        <div class="container">

            <!-- 卡片1：标题 + 祝福语 -->
            <div class="card">
                <div class="title">🎂 老爸，生日快乐</div>
                <div class="subtitle">
                    您是我心中最酷的人<br>
                    <span class="highlight">感谢您为这个家付出的一切</span>
                </div>
                <!-- 按钮可以改成给父亲发短信/打电话，这里示例保留联系方式 -->
                <a href="tel:13888888888" class="btn">📞 给老爸打个电话</a>
                <div class="tags">
                    <span class="tag">🛠 家里的万能工</span>
                    <span class="tag">🧑‍🍳 大厨级手艺</span>
                    <span class="tag">😂 幽默担当</span>
                </div>
            </div>

            <!-- 卡片2：我想对您说（温馨家书） -->
            <div class="card">
                <div class="title">❤️ 给爸爸的一封信</div>
                <div class="subtitle" style="text-align: left; padding: 0 4px; line-height: 1.9;">
                    爸爸，您辛苦了。<br><br>
                    这些年您默默扛下了所有，<br>
                    用宽厚的肩膀为我们遮风挡雨。<br><br>
                    您的白发和皱纹，<br>
                    都是这个家最珍贵的勋章。<br><br>
                    <span style="color: #fcd34d; font-weight: 500;">以后换我来守护您，就像您曾经守护我一样。</span>
                </div>
            </div>

            <!-- 卡片3：家庭照片（替换成你自己的照片） -->
            <div class="card">
                <div class="title">📸 我们的全家福</div>
                <div class="subtitle" style="margin-bottom: 8px; font-size: 13px;">每一个瞬间都值得珍藏</div>
                <div class="preview-grid">
                    <!-- 把下面 src 里的链接换成你 GitHub 仓库里的图片名 -->
                    <img class="preview-img" src="family1.jpg" alt="全家福1" />
                    <img class="preview-img" src="family2.jpg" alt="全家福2" />
                    <img class="preview-img" src="family3.jpg" alt="全家福3" />
                </div>
            </div>

            <!-- 卡片4：家庭小传（可选） -->
            <div class="card">
                <div class="title">🏠 我们的家</div>
                <div class="subtitle" style="text-align: left; padding: 0 4px; line-height: 1.9;">
                    从 <span style="color: #fcd34d;">1987年7月29日</span> 开始，<br>
                    这个家有了你，有了我，有了我们。<br><br>
                    三十多年的风风雨雨，<br>
                    你从未缺席。<br><br>
                    <span style="color: #fcd34d; font-weight: 500;">老爸，你是这个家的顶梁柱，也是我的超级英雄。</span>
                </div>
            </div>

            <div class="footer-note">🎁 送给最亲爱的爸爸 · 2026</div>
        </div>
    </div>
    <audio id="bgm" src="bgm.mp3" preload="none"></audio>

    <script>
        // ============================================================
        // 1. 底层粒子系统（彩虹色 + 陀螺仪互动）
        // ============================================================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const PARTICLE_COUNT = 100;
        let gyroX = 0,
            gyroY = 0;
        let targetGX = 0,
            targetGY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize, { passive: true });
        resize();

        class Particle {
            constructor(index) {
                this.index = index;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 2.5 + Math.random() * 4.5;
                this.baseX = Math.random() * width;
                this.baseY = Math.random() * height;
                this.wanderRadius = 50 + Math.random() * 80;
                this.wanderSpeed = 0.005 + Math.random() * 0.008;
                this.angle = Math.random() * Math.PI * 2;
                this.alpha = 0.4 + Math.random() * 0.6;
            }
            update() {
                const driftX = gyroX * 3.5;
                const driftY = gyroY * 3.5;
                this.angle += this.wanderSpeed;
                const wanderX = Math.sin(this.angle) * this.wanderRadius * 0.015;
                const wanderY = Math.cos(this.angle * 0.7) * this.wanderRadius * 0.015;
                const targetX = this.baseX + wanderX + driftX * 25;
                const targetY = this.baseY + wanderY + driftY * 25;
                this.x += (targetX - this.x) * 0.08;
                this.y += (targetY - this.y) * 0.08;
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;
            }
            draw() {
                const hue = (this.index / PARTICLE_COUNT) * 360 + Date.now() * 0.015;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 85%, 65%, ${this.alpha * 0.8})`;
                ctx.fill();
                const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                glow.addColorStop(0, `hsla(${hue}, 90%, 70%, 0.15)`);
                glow.addColorStop(1, `hsla(${hue}, 90%, 70%, 0)`);
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle(i));
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        const alpha = (1 - dist / 120) * 0.2;
                        const hue = (i / particles.length) * 360 + Date.now() * 0.01;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (const p of particles) p.update();
            drawLines();
            for (const p of particles) p.draw();
            requestAnimationFrame(animate);
        }
        animate();

        // ===== 陀螺仪 =====
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                let beta = e.beta || 0;
                let gamma = e.gamma || 0;
                targetGX = Math.max(-1, Math.min(1, gamma / 45));
                targetGY = Math.max(-1, Math.min(1, beta / 45));
            });
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', (e) => {
                            let beta = e.beta || 0;
                            let gamma = e.gamma || 0;
                            targetGX = Math.max(-1, Math.min(1, gamma / 45));
                            targetGY = Math.max(-1, Math.min(1, beta / 45));
                        });
                    }
                }).catch(() => {});
            }
        }

        setInterval(() => {
            gyroX += (targetGX - gyroX) * 0.12;
            gyroY += (targetGY - gyroY) * 0.12;
        }, 30);

        let autoDrift = 0;
        setInterval(() => {
            if (!window.DeviceOrientationEvent) {
                autoDrift += 0.003;
                targetGX = Math.sin(autoDrift) * 0.8;
                targetGY = Math.cos(autoDrift * 0.7) * 0.6;
            }
        }, 50);

        // ============================================================
        // 2. 上层落雪粒子（彩色飘落）
        // ============================================================
        const canvas2 = document.createElement('canvas');
        canvas2.id = 'snowCanvas';
        document.body.appendChild(canvas2);
        const ctx2 = canvas2.getContext('2d');
        let W2, H2;

        function resize2() {
            W2 = canvas2.width = window.innerWidth;
            H2 = canvas2.height = window.innerHeight;
        }
        window.addEventListener('resize', resize2, { passive: true });
        resize2();

        canvas2.style.position = 'fixed';
        canvas2.style.top = '0';
        canvas2.style.left = '0';
        canvas2.style.width = '100vw';
        canvas2.style.height = '100vh';
        canvas2.style.pointerEvents = 'none';
        canvas2.style.zIndex = '999';

        const snowflakes = [];
        const SNOW_COUNT = 50;

        class Snowflake {
            constructor() {
                this.reset();
                this.y = Math.random() * H2;
            }
            reset() {
                this.x = Math.random() * W2;
                this.y = -10;
                this.size = 2 + Math.random() * 5;
                this.speed = 0.4 + Math.random() * 1.2;
                this.wind = (Math.random() - 0.5) * 0.3;
                this.opacity = 0.2 + Math.random() * 0.4;
                this.hue = Math.random() * 360;
            }
            update() {
                this.y += this.speed;
                this.x += this.wind + Math.sin(this.y * 0.01) * 0.2;
                if (this.y > H2 + 10) {
                    this.reset();
                    this.y = -10;
                }
                if (this.x > W2 + 10) this.x = -10;
                if (this.x < -10) this.x = W2 + 10;
            }
            draw() {
                ctx2.beginPath();
                const gradient = ctx2.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 80%, ${this.opacity})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 80%, 0)`);
                ctx2.fillStyle = gradient;
                ctx2.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx2.fill();
                ctx2.beginPath();
                ctx2.arc(this.x, this.y, this.size * 0.4, 0, Math.PI * 2);
                ctx2.fillStyle = `hsla(0, 0%, 100%, ${this.opacity * 0.6})`;
                ctx2.fill();
            }
        }

        for (let i = 0; i < SNOW_COUNT; i++) {
            snowflakes.push(new Snowflake());
        }

        function animateSnow() {
            ctx2.clearRect(0, 0, W2, H2);
            for (const s of snowflakes) {
                s.update();
                s.draw();
            }
            requestAnimationFrame(animateSnow);
        }
        animateSnow();

        // ===== BGM 播放 =====
        const audioEl = document.getElementById('bgm');
        if (audioEl) {
            const playBGM = () => {
                audioEl.play().then(() => {
                    document.removeEventListener('click', playBGM);
                    document.removeEventListener('touchstart', playBGM);
                }).catch(() => {});
            };
            document.addEventListener('click', playBGM);
            document.addEventListener('touchstart', playBGM);
        }
    </script>
</body>
</html>
