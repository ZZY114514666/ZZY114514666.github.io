<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>个人工作室 · 品牌展示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* ===== 彩虹渐变（极慢动画，省性能） ===== */
    body {
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1, #5f27cd);
      background-size: 400% 400%;
      animation: rainbowSlow 30s ease-in-out infinite alternate;
    }

    @keyframes rainbowSlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== 毛玻璃遮罩 ===== */
    .overlay {
      position: relative;
      z-index: 1;
      background: rgba(10, 10, 20, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      min-height: 100vh;
      padding: 40px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== 卡片（保留悬停动画） ===== */
    .card {
      background: rgba(20, 22, 36, 0.7);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s ease;
    }

    /* 手机上点击反馈 */
    .card:active {
      transform: scale(0.98);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    /* 电脑上悬停效果（手机自动忽略） */
    @media (hover: hover) {
      .card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
        border-color: rgba(255, 255, 255, 0.12);
      }
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #f8f9fa, #b0d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: rgba(220, 230, 245, 0.75);
      font-size: 15px;
      line-height: 1.6;
      font-weight: 300;
    }

    .highlight {
      color: #7ecfff;
      font-weight: 500;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px 0;
      background: linear-gradient(145deg, #3a7bd5, #2b5fa8);
      border: none;
      border-radius: 60px;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      text-decoration: none;
      margin: 16px 0 6px;
      transition: opacity 0.15s ease;
      box-shadow: 0 4px 20px rgba(42, 109, 223, 0.3);
    }

    .btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 10px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 13px;
      color: #cfdfff;
      font-weight: 300;
    }

    .preview-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 14px;
    }

    .preview-img {
      width: 100%;
      border-radius: 14px;
      display: block;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .footer-note {
      text-align: center;
      color: rgba(255, 255, 255, 0.15);
      font-size: 11px;
      margin-top: 16px;
    }

    @media (max-width: 480px) {
      .overlay { padding: 24px 12px; }
      .card { padding: 18px 14px; }
      .title { font-size: 20px; }
      .btn { font-size: 15px; padding: 13px 0; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">

      <div class="card">
        <div class="title">✨ 星尘工作室</div>
        <div class="subtitle">
          专注 · 创新 · 极客精神<br>
          <span class="highlight">用心打磨每一行代码</span>
        </div>
        <a href="#" class="btn">📩 联系主理人</a>
        <div class="tags">
          <span class="tag">🛠 全栈开发</span>
          <span class="tag">🎨 UI/UX 设计</span>
          <span class="tag">📱 移动端优先</span>
        </div>
      </div>

      <div class="card">
        <div class="title">⚡ 我们的优势</div>
        <div class="subtitle" style="margin-bottom: 4px;">
          快速响应 ｜ 专业交付 ｜ 透明沟通
        </div>
        <div class="tags">
          <span class="tag">✅ 需求分析</span>
          <span class="tag">🚀 敏捷开发</span>
          <span class="tag">🔒 隐私合规</span>
        </div>
      </div>

      <div class="card">
        <div class="title">🛡️ 安全 & 诚信</div>
        <div class="subtitle">
          严格保密客户信息 · 不夸大 · 不盲从<br>
          <span style="color: #8cf0c0; font-weight: 400;">每一份交付都可追溯</span>
        </div>
      </div>

      <div class="card">
        <div class="title">📸 近期作品</div>
        <div class="subtitle" style="margin-bottom: 8px; font-size: 13px;">（示例截图 · 可替换为你自己的图片）</div>
        <div class="preview-grid">
          <img class="preview-img" src="https://picsum.photos/600/300?random=1" alt="作品截图1" />
          <img class="preview-img" src="https://picsum.photos/600/300?random=2" alt="作品截图2" />
        </div>
      </div>

      <div class="footer-note">© 2026 · 用 ❤️ 和 键盘 打造</div>
    </div>
  </div>

  <audio id="bgm" src="https://cdn.statically.io/gh/ZZY114514666/ZZY114514666.github.io/main/Sea_breeze(Phonk)-DJ%E5%B0%8F%E8%92%8B-450529779-100(1).mp3" preload="none"></audio>

  <script>
    const audio = document.getElementById('bgm');
    if (audio) {
      const playBGM = () => {
        audio.play().then(() => {
          document.removeEventListener('click', playBGM);
          document.removeEventListener('touchstart', playBGM);
        }).catch(() => {});
      };
      document.addEventListener('click', playBGM);
      document.addEventListener('touchstart', playBGM);
    }
  </script>
</body>
</html>
