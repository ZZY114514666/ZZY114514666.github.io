<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人工作室 · 品牌展示</title>
  <style>
    /* ===== 全局重置 & 基础 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    /* ===== 优化版彩虹渐变（流动感 + 光晕） ===== */
    body {
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1, #5f27cd, #ff6b6b);
      background-size: 300% 300%;
      animation: rainbowFlow 18s ease-in-out infinite alternate;
      position: relative;
    }

    /* 叠加一层柔光晕染，让彩虹更融合 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.15) 0%, transparent 60%),
                  radial-gradient(circle at 80% 70%, rgba(255, 200, 200, 0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes rainbowFlow {
      0% { background-position: 0% 0%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* ===== 毛玻璃遮罩层 ===== */
    .overlay {
      position: relative;
      z-index: 1;
      background: rgba(10, 10, 20, 0.55);
      backdrop-filter: blur(12px) saturate(1.2);
      -webkit-backdrop-filter: blur(12px) saturate(1.2);
      min-height: 100vh;
      padding: 48px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== 卡片设计 ===== */
    .card {
      background: rgba(20, 22, 36, 0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 28px 22px;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.4s ease;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* ===== 标题 & 文字 ===== */
    .title {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #f8f9fa, #b0d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }

    .subtitle {
      text-align: center;
      color: rgba(220, 230, 245, 0.8);
      font-size: 15px;
      line-height: 1.6;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .highlight {
      color: #7ecfff;
      font-weight: 500;
    }

    /* ===== 按钮 (QQ群 → 可改为微信/邮箱/链接) ===== */
    .btn {
      display: block;
      width: 100%;
      padding: 16px 0;
      background: linear-gradient(145deg, #3a7bd5, #2b5fa8);
      border: none;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      text-decoration: none;
      margin: 18px 0 8px;
      transition: all 0.25s ease;
      box-shadow: 0 6px 24px rgba(42, 109, 223, 0.35);
      letter-spacing: 1px;
    }

    .btn:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 32px rgba(42, 109, 223, 0.55);
      background: linear-gradient(145deg, #4c8ee0, #2f6bb8);
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* ===== 标签组（服务/特点） ===== */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 14px;
      color: #cfdfff;
      font-weight: 300;
      backdrop-filter: blur(2px);
    }

    /* ===== 图片占位 (可替换为你自己的截图) ===== */
    .preview-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 16px;
    }

    .preview-img {
      width: 100%;
      border-radius: 16px;
      display: block;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .preview-img:hover {
      transform: scale(1.01);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
    }

    /* 图片加载失败时的占位样式 */
    .preview-img::before {
      content: "🖼️ 图片加载中...";
      display: block;
      padding: 40px 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.25);
      font-size: 14px;
    }

    /* ===== 底部脚标 ===== */
    .footer-note {
      text-align: center;
      color: rgba(255, 255, 255, 0.2);
      font-size: 12px;
      margin-top: 20px;
      letter-spacing: 1px;
    }

    /* ===== 移动端适配 ===== */
    @media (max-width: 480px) {
      .overlay { padding: 28px 14px; }
      .card { padding: 22px 16px; }
      .title { font-size: 22px; }
      .btn { font-size: 16px; padding: 14px 0; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">

      <!-- ========= 卡片 1：品牌标题 + 简介 ========= -->
      <div class="card">
        <div class="title">✨ 星尘工作室</div>
        <div class="subtitle">
          专注 · 创新 · 极客精神<br>
          <span class="highlight">用心打磨每一行代码</span>
        </div>
        <!-- 按钮可改为你的微信/邮箱/官网链接 -->
        <a href="#" class="btn">📩 联系主理人</a>
        <div class="tags">
          <span class="tag">🛠 全栈开发</span>
          <span class="tag">🎨 UI/UX 设计</span>
          <span class="tag">📱 移动端优先</span>
        </div>
      </div>

      <!-- ========= 卡片 2：服务特色 ========= -->
      <div class="card">
        <div class="title">⚡ 我们的优势</div>
        <div class="subtitle" style="margin-bottom: 6px;">
          快速响应 ｜ 专业交付 ｜ 透明沟通
        </div>
        <div class="tags">
          <span class="tag">✅ 需求分析</span>
          <span class="tag">🚀 敏捷开发</span>
          <span class="tag">🔒 隐私合规</span>
        </div>
      </div>

      <!-- ========= 卡片 3：安全保障 ========= -->
      <div class="card">
        <div class="title">🛡️ 安全 & 诚信</div>
        <div class="subtitle">
          严格保密客户信息 · 不夸大 · 不盲从<br>
          <span style="color: #8cf0c0; font-weight: 400;">每一份交付都可追溯</span>
        </div>
      </div>

      <!-- ========= 卡片 4：作品截图展示 ========= -->
      <div class="card">
        <div class="title">📸 近期作品</div>
        <div class="subtitle" style="margin-bottom: 10px;">（示例截图 · 可替换为你自己的图片）</div>
        <div class="preview-grid">
          <!-- 替换 src 为你自己的图片链接，建议用仓库内相对路径如 "work1.jpg" -->
          <img class="preview-img" src="https://picsum.photos/600/300?random=1" alt="作品截图1" />
          <img class="preview-img" src="https://picsum.photos/600/300?random=2" alt="作品截图2" />
        </div>
      </div>

      <div class="footer-note">© 2026 · 用 ❤️ 和 键盘 打造</div>
    </div>
  </div>

  <!-- ===== 背景音乐（可删，默认不自动播放） ===== -->
  <audio id="bgm" src="https://cdn.statically.io/gh/ZZY114514666/ZZY114514666.github.io/main/Sea_breeze(Phonk)-DJ%E5%B0%8F%E8%92%8B-450529779-100(1).mp3" preload="none"></audio>

  <script>
    // 轻量交互：点击页面任意位置尝试播放 BGM（如果存在）
    const audio = document.getElementById('bgm');
    if (audio) {
      const playBGM = () => {
        audio.play().then(() => {
          document.removeEventListener('click', playBGM);
          document.removeEventListener('touchstart', playBGM);
        }).catch(() => {});
      };
      document.addEventListener('click', playBGM);
      document.addEventListener('touchstart', playBGM);
    }
  </script>
</body>
</html>
